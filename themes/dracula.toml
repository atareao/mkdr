[colors]
text = "#f8f8f2"
bg = "#282a36"
red = "#ff5555"
green = "#50fa7b"
yellow = "#f1fa8c"
blue = "#bd93f9"
purple = "#bd93f9"
cyan = "#8be9fd"
orange = "#ffb86c"
light_gray = "#e0e0e0"
dark_gray = "#44475a"
code_bg = "#21222c"

[styles]
paragraph = { fg = "text" }
bold = { fg = "text", bold = true }
italic = { fg = "text", italic = true }
strikeout = { fg = "text" }
inline_code = { fg = "orange", bg = "code_bg" }
code_block = { fg = "text", bg = "code_bg" }
heading1 = { fg = "red", bold = true }
heading2 = { fg = "purple", bold = true }
heading3 = { fg = "green" }
heading4 = { fg = "yellow" }
heading5 = { fg = "light_gray" }
heading6 = { fg = "light_gray" }
table = { fg = "cyan" }
bullet = { fg = "purple" }
quote_mark = { fg = "green" }
horizontal_rule = { fg = "dark_gray" }
ellipsis = { fg = "dark_gray" }