[colors]
text = "#cdd6f4"
bg = "#1e1e2e"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
purple = "#cba6f7"
cyan = "#94e2d5"
orange = "#fab387"
light_gray = "#bac2de"
dark_gray = "#313244"
code_bg = "#181825"

[styles]
paragraph = { fg = "text" }
bold = { fg = "text", bold = true }
italic = { fg = "text", italic = true }
strikeout = { fg = "text" }
inline_code = { fg = "orange", bg = "code_bg" }
code_block = { fg = "text", bg = "code_bg" }
heading1 = { fg = "red", bold = true }
heading2 = { fg = "blue", bold = true }
heading3 = { fg = "green" }
heading4 = { fg = "yellow" }
heading5 = { fg = "light_gray" }
heading6 = { fg = "light_gray" }
table = { fg = "cyan" }
bullet = { fg = "blue" }
quote_mark = { fg = "green" }
horizontal_rule = { fg = "dark_gray" }
ellipsis = { fg = "dark_gray" }