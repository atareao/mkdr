[colors]
text = "#c0caf5"
bg = "#1a1b26"
red = "#f7768e"
green = "#9ece6a"
yellow = "#e0af68"
blue = "#7aa2f7"
purple = "#bb9af7"
cyan = "#7dcfff"
orange = "#ff9e64"
light_gray = "#a9b1d6"
dark_gray = "#414868"
code_bg = "#1f2335"

[styles]
paragraph = { fg = "text" }
bold = { fg = "text", bold = true }
italic = { fg = "text", italic = true }
strikeout = { fg = "text" }
inline_code = { fg = "orange", bg = "code_bg" }
code_block = { fg = "text", bg = "code_bg" }
heading1 = { fg = "red", bold = true }
heading2 = { fg = "blue", bold = true }
heading3 = { fg = "green" }
heading4 = { fg = "yellow" }
heading5 = { fg = "light_gray" }
heading6 = { fg = "light_gray" }
link = { fg = "blue", underline = true }
table = { fg = "cyan" }
bullet = { fg = "blue" }
quote_mark = { fg = "green" }
horizontal_rule = { fg = "dark_gray" }
ellipsis = { fg = "dark_gray" }