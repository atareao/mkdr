name: CI

on:
  pull_request:
    branches: [main, development]
  push:
    branches: [development]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show
      - name: Build
        run: cargo build
      - name: Test
        run: cargo test